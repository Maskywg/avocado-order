<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理後台 - 環湖幸福果</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body { padding-top: 0; background: var(--gray-50); }
    .admin-layout { display: flex; min-height: 100vh; }
    .admin-sidebar {
      width: 240px;
      background: var(--dark);
      color: var(--white);
      padding: 24px 0;
      flex-shrink: 0;
    }
    .admin-sidebar h2 { padding: 0 24px; font-size: 18px; margin-bottom: 24px; }
    .admin-sidebar nav a {
      display: block;
      padding: 12px 24px;
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      font-size: 14px;
      transition: all 0.2s;
      cursor: pointer;
    }
    .admin-sidebar nav a:hover, .admin-sidebar nav a.active {
      color: var(--white);
      background: rgba(255,255,255,0.08);
    }
    .admin-main { flex: 1; padding: 32px; overflow-y: auto; }
    .admin-header { margin-bottom: 32px; }
    .admin-header h1 { font-size: 28px; }
    .admin-header p { color: var(--gray-500); }
    .admin-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }
    .admin-card {
      background: var(--white);
      border-radius: var(--radius-sm);
      padding: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .admin-card .label { font-size: 13px; color: var(--gray-500); margin-bottom: 8px; }
    .admin-card .value { font-size: 28px; font-weight: 800; }
    .admin-table {
      width: 100%;
      background: var(--white);
      border-radius: var(--radius-sm);
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .admin-table th, .admin-table td {
      padding: 14px 16px;
      text-align: left;
      font-size: 14px;
      border-bottom: 1px solid var(--gray-100);
    }
    .admin-table th {
      background: var(--gray-50);
      font-weight: 600;
      color: var(--gray-700);
      font-size: 13px;
      text-transform: uppercase;
    }
    .admin-table tr:hover td { background: var(--gray-50); }
    .admin-section { margin-bottom: 32px; }
    .admin-section h2 { font-size: 20px; margin-bottom: 16px; }
    .status-select {
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid var(--gray-200);
      font-size: 13px;
      background: var(--white);
    }
    .login-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, var(--green-900), var(--green-700));
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .login-box {
      background: var(--white);
      padding: 40px;
      border-radius: var(--radius);
      width: 360px;
      box-shadow: var(--shadow-lg);
    }
    .login-box h2 { text-align: center; margin-bottom: 24px; }
    .login-box input { width: 100%; padding: 12px 16px; margin-bottom: 12px; border: 2px solid var(--gray-200); border-radius: var(--radius-sm); font-size: 15px; }
    .login-box input:focus { outline: none; border-color: var(--green-500); }
    .login-box .btn { width: 100%; }
    .login-error { color: #ef4444; font-size: 14px; text-align: center; margin-bottom: 12px; display: none; }
    .hidden { display: none; }
    .edit-inline {
      border: 1px solid var(--gray-200);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 14px;
      width: 80px;
    }
    .btn-icon-sm {
      background: none;
      border: 1px solid var(--gray-200);
      border-radius: 6px;
      width: 30px;
      height: 30px;
      cursor: pointer;
      font-size: 14px;
    }
    .btn-icon-sm:hover { background: var(--gray-100); }
    .back-link {
      display: inline-block;
      margin-bottom: 16px;
      color: var(--green-600);
      text-decoration: none;
      font-size: 14px;
    }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="login-overlay" id="loginOverlay">
    <div class="login-box">
      <h2>🔐 管理員登入</h2>
      <div class="login-error" id="loginError">帳號或密碼錯誤</div>
      <form onsubmit="handleAdminLogin(event)">
        <input type="text" placeholder="管理員帳號" id="adminUser" value="admin" required>
        <input type="password" placeholder="密碼" id="adminPass" required>
        <button type="submit" class="btn btn-primary">登入後台</button>
      </form>
    </div>
  </div>

  <div class="admin-layout hidden" id="adminPanel">
    <aside class="admin-sidebar">
      <h2>🥑 管理後台</h2>
      <nav>
        <a class="active" onclick="switchAdminTab('dashboard')" data-tab="dashboard">📊 儀表板</a>
        <a onclick="switchAdminTab('orders')" data-tab="orders">📦 訂單管理</a>
        <a onclick="switchAdminTab('products')" data-tab="products">🥑 商品管理</a>
        <a onclick="switchAdminTab('users')" data-tab="users">👥 會員管理</a>
        <a onclick="handleAdminLogout()" style="margin-top:24px;color:#ef4444">🚪 登出</a>
      </nav>
    </aside>
    <main class="admin-main" id="adminMain"></main>
  </div>

  <div class="toast" id="toast"></div>
  <script src="../js/app.js"></script>
  <script>
    const ADMIN_USER = 'admin';
    const ADMIN_PASS = 'avocado888';

    PRODUCTS = DB.get('products', null) || [...DEFAULT_PRODUCTS];

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    function handleAdminLogin(e) {
      e.preventDefault();
      const user = document.getElementById('adminUser').value;
      const pass = document.getElementById('adminPass').value;
      if (user === ADMIN_USER && pass === ADMIN_PASS) {
        document.getElementById('loginOverlay').classList.add('hidden');
        document.getElementById('adminPanel').classList.remove('hidden');
        sessionStorage.setItem('avo_admin', '1');
        renderDashboard();
      } else {
        document.getElementById('loginError').style.display = 'block';
      }
    }

    if (sessionStorage.getItem('avo_admin') === '1') {
      document.getElementById('loginOverlay').classList.add('hidden');
      document.getElementById('adminPanel').classList.remove('hidden');
    }

    function handleAdminLogout() {
      sessionStorage.removeItem('avo_admin');
      document.getElementById('loginOverlay').classList.remove('hidden');
      document.getElementById('adminPanel').classList.add('hidden');
    }

    function switchAdminTab(tab) {
      document.querySelectorAll('.admin-sidebar nav a').forEach(a => a.classList.remove('active'));
      document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
      if (tab === 'dashboard') renderDashboard();
      else if (tab === 'orders') renderAdminOrders();
      else if (tab === 'products') renderAdminProducts();
      else if (tab === 'users') renderAdminUsers();
    }

    async function syncMembersFromGS() {
      if (!getGsUrl()) { showToast('請先設定 Google Sheets 網址'); return; }
      const members = await GS.getMembers();
      if (members && members.length > 0) {
        let users = getUsers();
        members.forEach(m => { if (!users.find(u => u.email === m.email)) users.push(m); });
        DB.set('users', users);
        showToast(`同步 ${members.length} 位會員`);
        renderAdminUsers();
      } else {
        showToast('無會員資料或同步失敗');
      }
    }

    function getOrders() { return DB.get('orders', []); }
    function saveOrders(orders) { DB.set('orders', orders); }
    function getUsers() { return DB.get('users', []); }

    function getGsUrl() { return DB.get('gsApiUrl', ''); }
    function setGsUrl(url) { DB.set('gsApiUrl', url); }

    async function syncOrdersFromGS() {
      const url = getGsUrl();
      if (!url) return false;
      const orders = await GS.getOrders();
      if (orders) { saveOrders(orders); return true; }
      return false;
    }

    function renderDashboard() {
      const orders = getOrders();
      const users = getUsers();
      const totalRevenue = orders.reduce((s, o) => s + (o.total || 0), 0);
      const pendingOrders = orders.filter(o => o.status === 'pending').length;
      const gsUrl = getGsUrl();
      document.getElementById('adminMain').innerHTML = `
        <div class="admin-header">
          <h1>📊 儀表板</h1>
          <p>環湖幸福果管理後台</p>
          <div style="margin-top:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <input type="text" id="gsUrlInput" placeholder="Google Apps Script 網址" value="${gsUrl}"
              style="flex:1;min-width:200px;padding:8px 12px;border:2px solid var(--gray-200);border-radius:6px;font-size:14px">
            <button class="btn btn-sm btn-primary" onclick="saveGsUrl()">💾 設定</button>
            <button class="btn btn-sm ${gsUrl ? 'btn-primary' : 'btn-outline'}" onclick="doSync()">🔄 同步訂單</button>
          </div>
        </div>
        <div class="admin-grid">
          <div class="admin-card"><div class="label">總訂單數</div><div class="value">${orders.length}</div></div>
          <div class="admin-card"><div class="label">待處理訂單</div><div class="value" style="color:#f59e0b">${pendingOrders}</div></div>
          <div class="admin-card"><div class="label">總營業額</div><div class="value" style="color:var(--green-600)">NT$${totalRevenue.toLocaleString()}</div></div>
          <div class="admin-card"><div class="label">會員數</div><div class="value">${users.length}</div></div>
        </div>
        <div class="admin-section">
          <h2>最新訂單</h2>
          ${renderOrderTable(orders.slice(0, 5))}
        </div>
      `;
    }

    function saveGsUrl() {
      const url = document.getElementById('gsUrlInput').value.trim();
      if (!url) { showToast('請輸入網址'); return; }
      setGsUrl(url);
      showToast('✅ 儲存成功');
    }

    async function doSync() {
      const ok = await syncOrdersFromGS();
      if (ok) {
        const members = await GS.getMembers();
        if (members && members.length > 0) {
          let users = getUsers();
          members.forEach(m => { if (!users.find(u => u.email === m.email)) users.push(m); });
          DB.set('users', users);
        }
        showToast('✅ 同步成功');
      } else showToast('❌ 同步失敗，請確認網址是否正確');
      renderDashboard();
    }

    function renderOrderTable(orders) {
      if (orders.length === 0) return '<p style="color:var(--gray-500)">暫無訂單</p>';
      return `<table class="admin-table">
        <thead><tr>
          <th>訂單編號</th><th>客戶</th><th>金額</th><th>付款</th><th>日期</th><th>狀態</th><th>操作</th>
        </tr></thead>
        <tbody>${orders.map(o => {
          const payLabels = { linepay: 'Line Pay', credit: '信用卡', transfer: '轉帳', cod: '貨到付款' };
          const statusOpts = ['pending', 'confirmed', 'shipped', 'delivered', 'cancelled'];
          return `<tr>
            <td><strong>${o.id}</strong></td>
            <td>${o.delivery?.name || o.user?.name || '-'}</td>
            <td>NT$${(o.total || 0).toLocaleString()}</td>
            <td>${payLabels[o.delivery?.payment] || '-'}</td>
            <td style="font-size:13px;color:var(--gray-500)">${new Date(o.createdAt).toLocaleDateString('zh-TW')}</td>
            <td>
              <select class="status-select" onchange="updateOrderStatus('${o.id}', this.value)">
                ${statusOpts.map(s => `<option value="${s}" ${o.status === s ? 'selected' : ''}>${statusLabel(s)}</option>`).join('')}
              </select>
            </td>
            <td><button class="btn btn-sm btn-outline" onclick="viewOrderDetail('${o.id}')">詳情</button></td>
          </tr>`;
        }).join('')}</tbody>
      </table>`;
    }

    function statusLabel(s) {
      return { pending: '待確認', confirmed: '已確認', shipped: '運送中', delivered: '已送達', cancelled: '已取消' }[s] || s;
    }

    function updateOrderStatus(id, status) {
      let orders = getOrders();
      const order = orders.find(o => o.id === id);
      if (order) { order.status = status; saveOrders(orders); showToast('訂單狀態已更新'); }
      if (document.querySelector('[data-tab="orders"]')?.classList.contains('active')) renderAdminOrders();
      else renderDashboard();
    }

    function viewOrderDetail(id) {
      const orders = getOrders();
      const o = orders.find(x => x.id === id);
      if (!o) return;
      const payLabels = { linepay: 'Line Pay', credit: '信用卡', transfer: '銀行轉帳', cod: '貨到付款' };
      document.getElementById('adminMain').innerHTML = `
        <a class="back-link" onclick="renderAdminOrders()">← 返回訂單列表</a>
        <div class="admin-header"><h1>訂單詳情 #${o.id}</h1></div>
        <div class="admin-card" style="max-width:600px">
          <div style="margin-bottom:16px"><strong>狀態：</strong> <span class="order-status ${o.status}">${statusLabel(o.status)}</span></div>
          <div style="margin-bottom:8px"><strong>客戶：</strong> ${o.delivery?.name || o.user?.name || '-'}</div>
          <div style="margin-bottom:8px"><strong>電話：</strong> ${o.delivery?.phone || '-'}</div>
          <div style="margin-bottom:8px"><strong>Email：</strong> ${o.delivery?.email || o.user?.email || '-'}</div>
          <div style="margin-bottom:8px"><strong>地址：</strong> ${o.delivery?.address || '-'}</div>
          <div style="margin-bottom:8px"><strong>付款方式：</strong> ${payLabels[o.delivery?.payment] || '-'}</div>
          <div style="margin-bottom:8px"><strong>備註：</strong> ${o.delivery?.note || '無'}</div>
          <div style="margin-bottom:8px"><strong>訂購時間：</strong> ${new Date(o.createdAt).toLocaleString('zh-TW')}</div>
          <hr style="margin:16px 0;border:none;border-top:1px solid var(--gray-200)">
          <h4>訂購商品</h4>
          ${(o.items || []).map(item => `<div style="display:flex;justify-content:space-between;padding:6px 0"><span>${item.name} × ${item.qty}</span><span>NT$${(item.price * item.qty).toLocaleString()}</span></div>`).join('')}
          <hr style="margin:12px 0;border:none;border-top:1px solid var(--gray-200)">
          <div style="display:flex;justify-content:space-between;font-weight:700;font-size:18px"><span>總計</span><span style="color:var(--green-700)">NT$${(o.total || 0).toLocaleString()}</span></div>
        </div>
      `;
    }

    function renderAdminOrders() {
      const orders = getOrders();
      document.getElementById('adminMain').innerHTML = `
        <div class="admin-header"><h1>📦 訂單管理</h1><p>共 ${orders.length} 筆訂單</p></div>
        ${renderOrderTable(orders)}
      `;
    }

    function renderAdminProducts() {
      document.getElementById('adminMain').innerHTML = `
        <div class="admin-header"><h1>🥑 商品管理</h1><p>管理商品庫存與價格</p></div>
        <table class="admin-table">
          <thead><tr><th>商品</th><th>名稱</th><th>原價</th><th>售價</th><th>庫存</th><th>操作</th></tr></thead>
          <tbody>
            ${PRODUCTS.map(p => `
              <tr>
                <td style="font-size:28px">${p.emoji}</td>
                <td><strong>${p.name}</strong></td>
                <td><input class="edit-inline" type="number" value="${p.originPrice}" id="originPrice_${p.id}" onchange="updateProduct(${p.id})"></td>
                <td><input class="edit-inline" type="number" value="${p.price}" id="price_${p.id}" onchange="updateProduct(${p.id})"></td>
                <td><input class="edit-inline" type="number" value="${p.stock}" id="stock_${p.id}" onchange="updateProduct(${p.id})"></td>
                <td>
                  <button class="btn btn-sm btn-primary" onclick="resetProduct(${p.id})">重置</button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function updateProduct(id) {
      const p = PRODUCTS.find(x => x.id === id);
      if (!p) return;
      const originPrice = parseInt(document.getElementById(`originPrice_${id}`).value);
      const price = parseInt(document.getElementById(`price_${id}`).value);
      const stock = parseInt(document.getElementById(`stock_${id}`).value);
      if (originPrice > 0) p.originPrice = originPrice;
      if (price > 0) p.price = price;
      if (stock >= 0) p.stock = stock;
      DB.set('products', PRODUCTS);
      showToast(`${p.name} 已更新`);
    }

    function resetProduct(id) {
      const originals = [
        { id: 1, originPrice: 40, price: 30, stock: 200 },
        { id: 2, originPrice: 40, price: 30, stock: 150 },
        { id: 3, originPrice: 45, price: 35, stock: 150 },
        { id: 4, originPrice: 50, price: 40, stock: 120 },
        { id: 5, originPrice: 50, price: 40, stock: 100 },
        { id: 6, originPrice: 699, price: 550, stock: 30 }
      ];
      const orig = originals.find(x => x.id === id);
      const p = PRODUCTS.find(x => x.id === id);
      if (orig && p) {
        p.originPrice = orig.originPrice;
        p.price = orig.price;
        p.stock = orig.stock;
        document.getElementById(`originPrice_${id}`).value = orig.originPrice;
        document.getElementById(`price_${id}`).value = orig.price;
        document.getElementById(`stock_${id}`).value = orig.stock;
        DB.set('products', PRODUCTS);
        showToast(`${p.name} 已重置`);
      }
    }

    async function renderAdminUsers() {
      let users = getUsers();
      const gsUrl = getGsUrl();
      let gsMembers = [];
      if (gsUrl) {
        gsMembers = await GS.getMembers() || [];
      }
      const allEmails = new Set();
      const merged = [];
      gsMembers.forEach(m => {
        if (!allEmails.has(m.email)) {
          allEmails.add(m.email);
          merged.push({ ...m, source: '📊 試算表' });
        }
      });
      users.forEach(u => {
        if (!allEmails.has(u.email)) {
          allEmails.add(u.email);
          merged.push({ ...u, source: '💻 本機' });
        }
      });
      document.getElementById('adminMain').innerHTML = `
        <div class="admin-header">
          <h1>👥 會員管理</h1>
          <p>共 ${merged.length} 位會員（試算表 ${gsMembers.length} 位）</p>
          <div style="margin-top:8px"><button class="btn btn-sm btn-primary" onclick="syncMembersFromGS()">🔄 同步會員</button></div>
        </div>
        <table class="admin-table">
          <thead><tr><th>#</th><th>暱稱</th><th>電子郵件</th><th>來源</th><th>註冊時間</th></tr></thead>
          <tbody>
            ${merged.length === 0 ? '<tr><td colspan="5" style="text-align:center;color:var(--gray-500)">暫無會員</td></tr>' :
            merged.map((u, i) => `<tr>
              <td>${i + 1}</td>
              <td><strong>${u.name || '-'}</strong></td>
              <td>${u.email || '-'}</td>
              <td style="font-size:12px">${u.source || '-'}</td>
              <td style="color:var(--gray-500);font-size:13px">${u.createdAt ? new Date(u.createdAt).toLocaleDateString('zh-TW') : '-'}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      `;
    }

    async function initAdmin() {
      if (getGsUrl()) {
        await syncOrdersFromGS();
        await GS.getMembers().then(members => {
          if (members && members.length > 0) {
            let users = getUsers();
            members.forEach(m => { if (!users.find(u => u.email === m.email)) users.push(m); });
            DB.set('users', users);
          }
        });
      }
      renderDashboard();
    }
    initAdmin();
  </script>
</body>
</html>
